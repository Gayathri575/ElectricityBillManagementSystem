<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bills</title>
    <style>
        table { border-collapse: collapse; width: 80%; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h2>Electricity bill </h2>

<table>
    <tr>
        <th>Bill ID</th>
        <th>Customer Name</th>
        <th>Month</th>
        <th>Units</th>
        <th>Amount</th>
    </tr>

    <tr th:each="b : ${bills}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.customer.name}"></td>
        <td th:text="${b.month}"></td>
        <td th:text="${b.units}"></td>
        <td th:text="${b.amount}"></td>
    </tr>
</table>

</body>
</html>
